services:
  backend:
    build:
      context: ./backend
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      - PORT=8081
      - NRP_API_TOKEN=${NRP_API_TOKEN}
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    volumes:
      - ./data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "8082:80"
    depends_on:
      - backend